<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast _Store - Painel</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .menu-container {
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6), inset 0 0 15px rgba(255, 0, 127, 0.2);
            border-radius: 12px;
            padding: 25px;
            width: 320px;
        }
        .title {
            text-align: center;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px;
            background: rgba(255, 0, 127, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 127, 0.3);
        }
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #d1d1d1;
            cursor: pointer;
        }
        .option input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid #ff007f;
            border-radius: 4px;
            background: transparent;
            position: relative;
        }
        .option input[type="checkbox"]:checked {
            background: #ff007f;
            box-shadow: 0 0 8px #ff007f;
        }
        .option input[type="checkbox"]:checked::after {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .slider-container {
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #ff007f;
            font-weight: bold;
        }
        .slider-container input[type="range"] {
            width: 100%;
            margin-top: 10px;
            accent-color: #ff007f;
        }
        .dropdown {
            width: 100%;
            padding: 12px;
            background: rgba(20, 0, 10, 0.8);
            color: #ff007f;
            border: 1px solid #ff007f;
            border-radius: 6px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }
        .btn-injetar {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #cc0066, #ff007f);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="title">Beast _Store</div>
        
        <div class="grid">
            <label class="option"><input type="checkbox" checked> Ativar Aimbot</label>
            <label class="option"><input type="checkbox" checked> NoRecoil</label>
            <label class="option"><input type="checkbox" checked> Aumentar Precisão</label>
            <label class="option"><input type="checkbox" checked> Ignorar Derrubados</label>
            <label class="option"><input type="checkbox"> Esp Line</label>
            <label class="option"><input type="checkbox"> Anti-Blacklist</label>
        </div>
        
        <div class="slider-container">
            <label>FOV: [ <span id="fovValue">304</span> ]</label>
            <input type="range" min="0" max="500" value="304" oninput="document.getElementById('fovValue').innerText = this.value">
        </div>

        <select class="dropdown">
            <option value="cabeca">Alvo: Cabeça</option>
            <option value="peito">Alvo: Peito</option>
        </select>

        <button class="btn-injetar" onclick="alert('Conectado à interface Beast _Store!')">INJETAR</button>
    </div>

</body>
</html>
